name: Build ArisCrate Plugin

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Build with Maven
      run: mvn clean package
    
    - name: List target directory
      run: ls -la target/
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: ArisCrate-Plugin
        path: target/ArisCrate-*.jar
        compression-level: 0
