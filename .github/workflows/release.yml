name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Update version in pom.xml
      run: |
        mvn versions:set -DnewVersion=${{ github.event.inputs.version }}
        mvn versions:commit
    
    - name: Build with Maven
      run: mvn clean package
    
    - name: Get JAR file name
      id: get_jar
      run: |
        JAR_FILE=$(ls target/ArisCrate-*.jar | head -n 1)
        echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
        echo "jar_name=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT
    
    - name: Create Git Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
        git push origin "v${{ github.event.inputs.version }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: v${{ github.event.inputs.version }}
        name: Release v${{ github.event.inputs.version }}
        body: |
          ## ArisCrate v${{ github.event.inputs.version }}
          
          ### Changes in this release:
          - Updated to version ${{ github.event.inputs.version }}
          
          ### Installation:
          1. Download the JAR file below
          2. Place in your server's `plugins` folder
          3. Restart your server
        draft: false
        prerelease: false
        generateReleaseNotes: true
        artifacts: ${{ steps.get_jar.outputs.jar_file }}
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Commit version change
      run: |
        git config user.name "github-actions[bot]"
        git config.user.email "github-actions[bot]@users.noreply.github.com"
        git add pom.xml
        git commit -m "Bump version to ${{ github.event.inputs.version }}" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
