prefix: "&8[&6ArisCrate&8] &7"

command:
  usage: "&cUsage: /ariscrate <crates|delcrate|additem|deleteitem|movehere|give|take|keyall|reload>"
  only-player: "&cThis command can only be used by players."
  console-must-specify: "&cConsole must specify player."
  player-not-found: "&cPlayer not found"
  invalid-number: "&cAmount must be a number"
  invalid-slot: "&cSlot must be a number"
  reloaded: "&aPlugin reloaded successfully!"
  no-permission: "&cYou don't have permission to use this command!"
  
  create-usage: "&cUsage: /ariscrate crates <name>"
  crate-exists: "&cCrate &e{name} &calready exists!"
  crate-created: "&aCreated crate &e{name} &aat {x},{y},{z}"
  
  delete-usage: "&cUsage: /ariscrate delcrate <name>"
  crate-deleted: "&aDeleted crate &e{name}"
  crate-not-exist: "&cCrate &e{name} &cdoes not exist."
  
  additem-usage: "&cUsage: /ariscrate additem <crate> <slot>"
  crate-not-exist-add: "&cCrate &e{crate} &cdoes not exist."
  hold-item: "&cYou must hold an item in your hand."
  item-added: "&aAdded item to crate &e{crate}&a at slot &e{slot}"
  
  deleteitem-usage: "&cUsage: /ariscrate deleteitem <crate> <slot>"
  item-deleted: "&aDeleted item from crate &e{crate}&a at slot &e{slot}"
  no-item-at-slot: "&cNo item found at slot &e{slot}"
  
  movehere-usage: "&cUsage: /ariscrate movehere <crate>"
