  give-usage: "&cUsage: /ariscrate give <key> <amount> | /ariscrate give <key> <player> <amount>"
  key-given: "&aGave &e{amount} &akey(s) {key} to &e{target}"
  
  take-usage: "&cUsage: /ariscrate take <key> <player> <amount>"
  key-taken: "&aTook &e{amount} &akey(s) {key} from &e{target}"
  not-enough: "&cPlayer does not have enough keys."
  
  keyall-usage: "&cUsage: /ariscrate keyall <crate> <amount>"
  keyall-header: "&8&m--------------------------------------------------"
  keyall-message: " &a&lKEYALL &7» You received &e{amount} &f{key_name}{suffix}!"
  keyall-footer: "&8&m--------------------------------------------------"
  keyall-title: "#00FB4B&lKEYALL"
  keyall-subtitle: "&f+{amount} &e{key_name}"
  keyall-sender: "&aGave everyone &e{amount} &akey(s) for &e{crate}"

crate:
  no-key: "&cYou don't have a key for this crate!"
  no-key-found: "&cNo key found."
  not-enough-keys: "&cYou don't have enough keys."
  received-broadcast: "&7Player #0EFF90{player} &7received item &7[{item}&7]!"
  need-permission: "&cYou need {permission} to use this crate!"
