name: ArisCrate
version: 1.0
main: me.aris.crates.ArisCrate
api-version: 1.20
folia-supported: true
description: Plugin quản lý Crate hỗ trợ Folia và Paper
commands:
  ariscrate:
    description: Lệnh chính của ArisCrate
    aliases: [ac, arisc]
    permission: ariscrate.admin
    usage: /<command> [create|edit|delete|movehere]
permissions:
  ariscrate.admin:
    description: Quyền quản trị ArisCrate
    default: op
