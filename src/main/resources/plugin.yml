name: ArisCrate
version: 1.0.0
main: me.aris.ariscrate.ArisCrate
api-version: 1.20
folia-supported: true
author: Aris
description: Advanced crate plugin with key system

commands:
  ariscrate:
    description: Main command for ArisCrate
    usage: /ariscrate
    aliases: [acrate, ariscrates]

permissions:
  ariscrate.admin:
    description: Admin permissions for ArisCrate
    default: op
  ariscrate.user:
    description: User permissions for ArisCrate
    default: true
  ariscrate.cancel:
    description: Cancel permission
    default: true
  ariscrate.confirm:
    description: Confirm permission
    default: true
